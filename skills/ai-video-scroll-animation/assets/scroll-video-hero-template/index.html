<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Video Scroll Hero</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* Above the fold — pre-hero content */
    .pre-hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #666;
    }

    /* =====================
       HERO SECTION
       Height controls total scroll distance to drive animation.
       Increase multiplier for slower/longer scroll experience.
    ===================== */
    #hero-section {
      height: 500vh; /* 5x viewport = user scrolls this distance to complete animation */
      position: relative;
    }

    /* Sticky container — stays at viewport top while parent section scrolls */
    #hero-sticky {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    /* === VIDEO SCRUB MODE (default) === */
    #hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* === IMAGE SEQUENCE MODE (alternative) ===
       Swap: hide video, show canvas
    */
    #hero-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      display: none; /* set to block to use image sequence mode */
    }

    /* Gradient overlay — subtle depth effect */
    .hero-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(0,0,0,0.2) 50%,
        rgba(0,0,0,0.7) 100%
      );
      z-index: 1;
      pointer-events: none;
    }

    /* Text & UI overlay */
    #hero-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 60px;
    }

    .hero-eyebrow {
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-bottom: 16px;
      opacity: 0;  /* animated in by GSAP */
    }

    .hero-headline {
      font-size: clamp(2.5rem, 6vw, 6rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.02em;
      max-width: 800px;
      opacity: 0;  /* animated in by GSAP */
    }

    .hero-subhead {
      font-size: clamp(1rem, 2vw, 1.5rem);
      font-weight: 400;
      color: rgba(255,255,255,0.7);
      margin-top: 20px;
      max-width: 500px;
      opacity: 0;  /* animated in by GSAP */
    }

    .hero-cta {
      margin-top: 40px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      color: #000;
      font-weight: 600;
      font-size: 1rem;
      padding: 14px 28px;
      border-radius: 100px;
      text-decoration: none;
      opacity: 0;  /* animated in by GSAP */
    }

    /* Post-hero content */
    .post-hero {
      height: 200vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #444;
    }
  </style>
</head>
<body>

  <div class="pre-hero">
    <p>Scroll down ↓</p>
  </div>

  <section id="hero-section">
    <div id="hero-sticky">

      <!-- VIDEO SCRUB MODE -->
      <!-- Replace /videos/hero-web.mp4 with your actual video path -->
      <video
        id="hero-video"
        preload="auto"
        muted
        playsinline
        webkit-playsinline
        poster="/images/hero-poster.jpg"
      >
        <source src="/videos/hero-web.webm" type="video/webm">
        <source src="/videos/hero-web.mp4" type="video/mp4">
      </video>

      <!-- IMAGE SEQUENCE MODE (alternative — switch display in CSS above) -->
      <!-- Requires frame images at /frames/frame-0001.jpg etc. -->
      <canvas id="hero-canvas" width="1920" height="1080"></canvas>

      <!-- Gradient overlay -->
      <div class="hero-gradient"></div>

      <!-- Text overlay (animated by GSAP) -->
      <div id="hero-overlay">
        <p class="hero-eyebrow" id="hero-eyebrow">Introducing something new</p>
        <h1 class="hero-headline" id="hero-headline">Motion that<br>stops the scroll</h1>
        <p class="hero-subhead" id="hero-subhead">
          AI-generated visuals wired directly to your scroll position.
        </p>
        <a href="#" class="hero-cta" id="hero-cta">Get started →</a>
      </div>

    </div>
  </section>

  <div class="post-hero">
    <p>Rest of your page continues here.</p>
  </div>


  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    // =============================================
    // CONFIG — Edit these values for your project
    // =============================================
    const USE_IMAGE_SEQUENCE = false;  // set true to use canvas/frames instead of video
    const FRAME_COUNT = 120;           // number of extracted frames (image sequence mode)
    const FRAME_PATH = (n) => `/frames/frame-${String(n).padStart(4, '0')}.jpg`;

    // =============================================
    // MODE A: VIDEO SCRUB
    // =============================================
    if (!USE_IMAGE_SEQUENCE) {
      const video = document.querySelector('#hero-video');

      const initVideoScrub = () => {
        ScrollTrigger.create({
          trigger: '#hero-section',
          start: 'top top',
          end: 'bottom bottom',
          scrub: 0.5,
          onUpdate: (self) => {
            if (video.readyState >= 2 && video.duration) {
              video.currentTime = self.progress * video.duration;
            }
          }
        });
      };

      if (video.readyState >= 2) {
        initVideoScrub();
      } else {
        video.addEventListener('loadedmetadata', initVideoScrub);
      }
    }

    // =============================================
    // MODE B: IMAGE SEQUENCE
    // =============================================
    if (USE_IMAGE_SEQUENCE) {
      document.querySelector('#hero-video').style.display = 'none';
      const canvas = document.querySelector('#hero-canvas');
      canvas.style.display = 'block';
      const ctx = canvas.getContext('2d');

      const frames = new Array(FRAME_COUNT).fill(null);
      let loadedCount = 0;

      const loadFrame = (i) => new Promise((resolve) => {
        const img = new Image();
        img.onload = img.onerror = () => { loadedCount++; resolve(); };
        img.src = FRAME_PATH(i + 1);
        frames[i] = img;
      });

      const drawFrame = (index) => {
        const clamped = Math.max(0, Math.min(index, FRAME_COUNT - 1));
        if (frames[clamped]?.complete) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(frames[clamped], 0, 0, canvas.width, canvas.height);
        }
      };

      // Preload first 10 frames, then init scroll, then load rest
      Promise.all(Array.from({length: 10}, (_, i) => loadFrame(i))).then(() => {
        drawFrame(0);

        ScrollTrigger.create({
          trigger: '#hero-section',
          start: 'top top',
          end: 'bottom bottom',
          scrub: 0.5,
          anticipatePin: 1,
          onUpdate: (self) => {
            drawFrame(Math.floor(self.progress * (FRAME_COUNT - 1)));
          }
        });

        // Load remaining frames in background
        for (let i = 10; i < FRAME_COUNT; i++) loadFrame(i);
      });
    }

    // =============================================
    // TEXT LAYER ANIMATIONS
    // Animate text in sync with scroll progress
    // =============================================
    const textTl = gsap.timeline({
      scrollTrigger: {
        trigger: '#hero-section',
        start: 'top top',
        end: 'bottom bottom',
        scrub: 0.8
      }
    });

    // Fade in eyebrow at 5% scroll
    textTl.fromTo('#hero-eyebrow',
      { opacity: 0, y: 20 },
      { opacity: 1, y: 0, duration: 0.1 },
      0.05
    )
    // Fade in headline at 10% scroll
    .fromTo('#hero-headline',
      { opacity: 0, y: 30 },
      { opacity: 1, y: 0, duration: 0.15 },
      0.1
    )
    // Fade in subhead at 20% scroll
    .fromTo('#hero-subhead',
      { opacity: 0, y: 20 },
      { opacity: 1, y: 0, duration: 0.15 },
      0.2
    )
    // Fade in CTA at 30% scroll
    .fromTo('#hero-cta',
      { opacity: 0, y: 20 },
      { opacity: 1, y: 0, duration: 0.1 },
      0.3
    )
    // Fade out all text at 75% scroll
    .to('#hero-overlay',
      { opacity: 0, duration: 0.1 },
      0.75
    );


    // =============================================
    // REDUCED MOTION SUPPORT
    // =============================================
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      // Kill all scroll animations and show static state
      ScrollTrigger.getAll().forEach(t => t.kill());
      gsap.set(['#hero-eyebrow', '#hero-headline', '#hero-subhead', '#hero-cta'],
        { opacity: 1, y: 0 }
      );
      // Show first video frame as static poster
      const video = document.querySelector('#hero-video');
      if (video) { video.currentTime = 0; }
    }
  </script>

</body>
</html>
